profile_id: java_class
title: Java class/interface/enum/record profile
source_type: java_source
default_impact: medium
knowledge_targets:
  - java_type
  - method
  - call_site
lookup_key_hints:
  - package
  - class
  - interface
  - enum
  - record
  - extends
  - implements
  - annotation
  - method
  - import
section_hints:
  - Java Facts
  - Annotations
  - Imports
  - Methods
  - Outbound Calls
impact_rules:
  - if: "contains:public "
    severity: medium
  - if: "contains:@RestController"
    severity: high
  - if: "contains:@Service"
    severity: high
  - if: "contains:@Repository"
    severity: high
  - if: "contains:@Mapper"
    severity: high
cautions:
  - regex-based extraction; nested generics and multi-line signatures may be imprecise
  - outbound_calls is heuristic (identifier.method() / new Type()); not a real AST call graph
  - use meta for navigation; always verify structure against the .java artifact

