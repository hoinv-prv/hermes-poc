  common:            ../_shared/review/checklists/common_document_review_checklist.md
  document_specific: checklists/testcase_review_checklist.md

output_templates:
  shared_dir: ../_shared/review/output_templates/
  review_report:     ../_shared/review/output_templates/review_report.md
  findings_table:    ../_shared/review/output_templates/findings_table.md
  open_questions:    ../_shared/review/output_templates/open_questions.md
  references_used:   ../_shared/review/output_templates/references_used.md
  review_limitations: ../_shared/review/output_templates/review_limitations.md

target_document:
  type: Test Case Document
  examples:
    - test case spec / test design document
    - test case sheet (per feature / per screen / per API)
    - regression test suite document
    - acceptance test case set
  expected_format: |
    A set of test cases, each typically carrying: case id, target requirement/feature, precondition,
    test data, steps, expected result, and (optionally) role/permission, data state, status
    transition, and priority. The agent reviews coverage and quality across these axes; it does not
    require any single fixed template.

review_principles:
  - wiki_grounded_not_wiki_only
  - evidence_required_for_important_findings
  - separate_issue_question_suggestion
  - report_conflict_not_silent_resolve
  - avoid_generic_findings
  - coverage_assessed_against_requirement_not_against_existing_cases

finding_categories:
  - coverage_gap
  - abnormal_case_gap
  - boundary_case_gap
  - expected_result_ambiguity
  - precondition_gap
  - test_data_gap
  - regression_risk
  - requirement_trace_gap

# Severity tier meanings are shared (../_shared/review/process/severity_definition.md).
# These are test-case-SPECIFIC examples that illustrate the tiers; they do NOT redefine them.
# Aligned with checklists/testcase_review_checklist.md §5.
severity_examples:
  critical: |
    A major requirement has NO test coverage at all, or a security/authorization path is untested
    (e.g. an unauthorized-access case is entirely missing).
  major: |
    Important abnormal / boundary / status-transition cases are missing, OR an expected result is
    so vague it cannot be verified (e.g. "system behaves correctly"), OR a regression-prone hot
    path is left unprotected by coverage.
  minor: |
    Test data or precondition wording is incomplete but the intent is inferable; case grouping
    makes coverage hard to read but the coverage exists.
  suggestion: |
    Improve case naming, grouping, or requirement-to-case traceability format for maintainability.

learning_candidate_types:
  - review_rule_candidate
  - checklist_update_candidate
  - retrieval_hint_candidate
  - false_positive_note_candidate
  - project_issue_pattern_candidate
  - output_preference_candidate
  - wiki_candidate
  - blueprint_improvement_candidate
